<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A basic app using weather api">
    <title>weather</title>
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/custom.css">
  </head>
  <body>
    <header>
      <h3 class="header-h3">Weather Station</h3>
      <form id="form">
        <input
          type="text"
          id="city-input"
          placeholder="Search"
          autocomplete="off"
          spellcheck="false"
        >
      </form>
    </header>
    <main>
      <h4 class="card-current indent space">Current</h4>
      <div id="weather"></div>
    </main>
    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
